<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Produtos Enova</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--white:#fff;--dark:#111827;--mid:#374151;--muted:#9ca3af;
  --border:#e5e7eb;--green:#059669;--shadow:0 1px 3px rgba(0,0,0,.08);
  --grad:linear-gradient(90deg,#FAA212 0%,#FAA842 20%,#F47D39 40%,#F0628C 60%,#ED2F59 80%,#934B9B 100%);
}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--dark);min-height:100vh}

/* HEADER + HERO = one unified gradient block */
.top-block{
  background:var(--grad);
  display:flex;
  flex-direction:column;
}

/* HEADER row */
.header{
  padding:0 40px;
  height:100px;
  display:flex;
  align-items:center;
}
.header-logo img{height:140px;width:144px;object-fit:contain;display:block;margin-top:20px;}
.header-count{
  margin-left:auto;
  font-size:12px;
  color:rgba(255,255,255,0.85);
  font-weight:500;
}
.header-count span{color:#fff;font-weight:700}

/* HERO row */
.hero{
  padding:16px 40px 52px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:22px;
}
.hero-title{
  font-size:28px;font-weight:800;color:#fff;
  letter-spacing:-.4px;line-height:1.2;
  text-shadow:0 1px 6px rgba(0,0,0,.15);
}
.hero-title .brand{
  color:#FAA212;
  /* no stroke, no text-shadow override */
}

.search-bar{display:flex;gap:12px;width:100%;max-width:660px}
.search-input-wrap{flex:1}
.search-input-wrap input{
  width:100%;background:rgba(255,255,255,0.95);border:2px solid rgba(255,255,255,0.6);
  border-radius:12px;padding:15px 20px;font-family:'Outfit',sans-serif;
  font-size:15px;font-weight:500;color:#111827;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search-input-wrap input::placeholder{color:#9ca3af}
.search-input-wrap input:focus{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.3)}
.btn-search{
  background:#FAA212;color:#fff;border:none;border-radius:12px;
  padding:15px 30px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.btn-search:hover{background:#e8920a;transform:translateY(-1px)}
.btn-search:active{transform:translateY(0)}

.search-hint{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center;font-size:12px;color:rgba(255,255,255,.85)}
.search-hint span{display:flex;align-items:center;gap:5px}
.hint-tag{background:rgba(0,0,0,.2);border-radius:4px;padding:2px 8px;font-size:11px;color:rgba(255,255,255,.95);font-family:'JetBrains Mono',monospace}

/* CONTENT */
.content{padding:32px 40px;min-height:40vh}
.state-box{max-width:460px;margin:60px auto;text-align:center}
.state-icon{font-size:44px;margin-bottom:14px}
.state-title{font-size:19px;font-weight:700;margin-bottom:8px}
.state-desc{font-size:14px;color:var(--muted);line-height:1.6}

.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.results-title{font-size:14px;color:var(--muted);font-weight:500}
.results-title strong{color:var(--dark);font-weight:700}
.btn-toggle-all{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--mid);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-toggle-all:hover{background:var(--bg);border-color:var(--muted)}
.products-grid{display:flex;flex-direction:column;gap:14px}
.multi-info{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:11px 15px;margin-bottom:14px;font-size:13px;color:#92400e;display:flex;gap:8px;align-items:center}

/* CARD */
.product-card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);animation:slideIn .18s ease both}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.product-card-header{padding:18px 22px;display:flex;align-items:flex-start;gap:14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#f8faff,#fff)}
.product-card-header-info{flex:1;min-width:0}
.product-card-title{font-size:16px;font-weight:700;line-height:1.3;margin-bottom:10px;color:var(--dark)}
.product-card-tags{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tag{display:inline-flex;align-items:center;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;white-space:nowrap}
.tag-formato{background:rgba(250,168,66,0.15);color:#c47a00;border:1.5px solid #FAA842}
.tag-sku{background:rgba(244,125,57,0.15);color:#c45500;border:1.5px solid #F47D39}
.tag-brand{background:rgba(240,98,140,0.15);color:#c0205a;border:1.5px solid #F0628C}
.tag-cat{background:rgba(237,47,89,0.15);color:#b8002a;border:1.5px solid #ED2F59}
.tag-linha{background:rgba(147,75,155,0.15);color:#6b2474;border:1.5px solid #934B9B}
.btn-card-toggle{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--mid);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-card-toggle:hover{background:var(--bg)}
.arrow{transition:transform .2s;display:inline-block;font-size:10px}
.arrow.open{transform:rotate(180deg)}

/* SECTIONS */
.product-sections{padding:0 22px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s ease}
.product-sections.open{max-height:9999px;padding:18px 22px}
.psection{margin-bottom:20px}
.psection:last-child{margin-bottom:0}
.psection-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.fields-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px}
.fields-grid-desc{display:grid;grid-template-columns:1fr;gap:9px}

/* FIELD */
.field-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;flex-direction:column;gap:4px;position:relative;transition:border-color .15s,background .15s}
.field-item:hover{border-color:#FAA842;background:#fff9f0}
.field-item:hover .copy-btn{opacity:1}
.field-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.field-value{font-size:14px;font-weight:500;color:var(--dark);word-break:break-word;line-height:1.5}
.fv-mono{font-family:'JetBrains Mono',monospace;font-size:13px;color:#2563eb;font-weight:600}
.fv-price{font-family:'JetBrains Mono',monospace;font-size:16px;color:#059669;font-weight:700}
.fv-null{color:var(--muted);font-style:italic;font-size:13px;font-weight:400}
.fv-desc{font-size:13px;line-height:1.75;color:var(--mid);white-space:pre-wrap}
.field-item.fi-code{background:rgba(147,75,155,0.12);border-color:#934B9B}.field-item.fi-code:hover{background:rgba(147,75,155,0.22);border-color:#7a3082}
.field-item.fi-price{background:rgba(237,47,89,0.12);border-color:#ED2F59}.field-item.fi-price:hover{background:rgba(237,47,89,0.22);border-color:#c0002a}

.copy-btn{position:absolute;right:8px;top:8px;background:var(--white);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;opacity:0;transition:all .15s;font-family:'Outfit',sans-serif;white-space:nowrap}
.copy-btn:hover{background:#FAA212;color:#fff;border-color:#FAA212}
.copy-btn.copied{background:var(--green);color:#fff;border-color:var(--green);opacity:1}

@media(max-width:700px){
  .header,.content{padding-left:20px;padding-right:20px}
  .hero{padding:12px 20px 36px}
  .search-bar{flex-direction:column}
  .btn-search{width:100%}
  .fields-grid{grid-template-columns:1fr 1fr}
  .product-card-header{flex-direction:column}
}

.loading-box{max-width:460px;margin:60px auto;text-align:center}
.loading-spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#FAA212;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:#9ca3af}
.error-box{max-width:460px;margin:60px auto;text-align:center;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:24px}
.error-title{font-size:17px;font-weight:700;color:#dc2626;margin-bottom:8px}
.error-desc{font-size:13px;color:#991b1b;line-height:1.6}
</style>
</head>

        '<div class="state-box"><div class="state-icon">&#128269;</div><div class="state-title">Pronto para buscar</div><div class="state-desc">Use a barra acima para pesquisar.</div></div>';
    } catch(e) {
      showError('Erro ao processar os dados.');
    }
  };

  // Try fetch first (works on GitHub Pages)
  if (window.fetch) {
    fetch(API_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        DATA = data;
        document.getElementById('totalCount').textContent = DATA.length;
        document.getElementById('searchInput').disabled = false;
        document.getElementById('btnSearch').disabled = false;
        document.getElementById('content').innerHTML =
          '<div class="state-box"><div class="state-icon">&#128269;</div><div class="state-title">Pronto para buscar</div><div class="state-desc">Use a barra acima para pesquisar. Os resultados aparecem aqui com todas as informações do produto.</div></div>';
      })
      .catch(function(err) {
        showError('Não foi possível carregar os dados. Verifique sua conexão com a internet.<br><br>Detalhes: ' + err.message);
      });
  } else {
    showError('Seu navegador não suporta esta funcionalidade. Por favor use Chrome ou Edge.');
  }
}

function showError(msg) {
  document.getElementById('content').innerHTML =
    '<div class="error-box"><div class="error-title">&#9888; Erro ao carregar</div><div class="error-desc">' + msg + '</div></div>';
}

loadData();

document.getElementById('searchInput').addEventListener('keydown', function(e) { if(e.key==='Enter') doSearch(); });
document.getElementById('btnSearch').addEventListener('click', doSearch);

function norm(s) { return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }

function doSearch() {
  if(!DATA.length) return;
  var q = norm(document.getElementById('searchInput').value.trim());
  if(!q) return;
  allExpanded = false;
  var results = DATA.filter(function(d) {
    return norm(d['SKU']).indexOf(q)>=0 ||
           norm(d['GTIN 13']).indexOf(q)>=0 ||
           norm(d['GTIN 13/14']).indexOf(q)>=0 ||
           norm(d['GTIN 14']).indexOf(q)>=0 ||
           norm(d['CATEGORIA ENOVA']).indexOf(q)>=0 ||
           norm(d['CATEGORIA MKTPLC']).indexOf(q)>=0 ||
           norm(d['LINHA']).indexOf(q)>=0 ||
           norm(d['MARCA']).indexOf(q)>=0 ||
           norm(d['TÍTULO']).indexOf(q)>=0 ||
           norm(d['TÍTULO PARA MERCADO LIVRE (máx. 60 carac.)']).indexOf(q)>=0;
  });
  renderResults(results, document.getElementById('searchInput').value.trim());
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtPrice(v) {
  var s = String(v||'').trim();
  if(s==='-'||s==='') return null;
  var n = parseFloat(s.replace(',','.'));
  if(isNaN(n)) return esc(s);
  return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function renderResults(results, q) {
  var content = document.getElementById('content');
  if(!results.length) {
    content.innerHTML = '<div class="state-box"><div class="state-icon">&#128533;</div><div class="state-title">Nenhum resultado</div><div class="state-desc">Nenhum produto encontrado para <strong>'+esc(q)+'</strong>.<br>Tente o SKU completo, EAN, marca ou categoria.</div></div>';
    return;
  }
  var single = results.length===1;
  var html = '<div class="results-header"><div class="results-title"><strong>'+results.length+'</strong> produto'+(results.length>1?'s':'')+' encontrado'+(results.length>1?'s':'')+' para “'+esc(q)+'”</div>';
  if(results.length>1) html += '<button class="btn-toggle-all" id="btnToggleAll" onclick="toggleAll()">&#9660; Expandir todos</button>';
  html += '</div>';
  if(results.length>1) html += '<div class="multi-info">&#9889; Clique em <strong>Ver detalhes</strong> para expandir cada produto.</div>';
  html += '<div class="products-grid" id="productsGrid">';
  for(var i=0;i<results.length;i++) html += buildCard(results[i], single);
  html += '</div>';
  content.innerHTML = html;
}

function buildField(key, val) {
  var empty = val===null||val===undefined||val==='';
  var isCode = CODE_FIELDS.indexOf(key)>=0;
  var isPrice = PRICE_FIELDS.indexOf(key)>=0;
  var isDesc = key==='DESCRIÇÃO';
  var cardCls = 'field-item';
  var displayVal = '';
  var rawVal = '';
  if(empty) {
    return '<div class="'+cardCls+'"><div class="field-label">'+esc(key)+'</div><span class="fv-null">—</span></div>';
  } else if(isPrice) {
    var pf = fmtPrice(val);
    if(!pf) return '<div class="'+cardCls+'"><div class="field-label">'+esc(key)+'</div><span class="fv-null">—</span></div>';
    displayVal = '<span class="fv-price">'+pf+'</span>';
    cardCls += ' fi-price'; rawVal = String(val);
  } else if(isCode) {
    displayVal = '<span class="fv-mono">'+esc(val)+'</span>';
    cardCls += ' fi-code'; rawVal = String(val);
  } else if(isDesc) {
    displayVal = '<span class="fv-desc">'+esc(val)+'</span>';
    rawVal = String(val);
  } else {
    displayVal = '<span class="field-value">'+esc(val)+'</span>';
    rawVal = String(val);
  }
  var attrVal = rawVal.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return '<div class="'+cardCls+'" data-copy="'+attrVal+'"><div class="field-label">'+esc(key)+'</div>'+displayVal+'<button class="copy-btn" onclick="copyFromCard(this)">Copiar</button></div>';
}

function buildCard(d, expanded) {
  var openCls = expanded?' open':'';
  var arrowCls = expanded?' open':'';
  var sectHtml = '';
  for(var s=0;s<SECTIONS.length;s++) {
    var sec = SECTIONS[s];
    var isDescSec = sec.label==='Descrição';
    var fHtml = '';
    for(var f=0;f<sec.fields.length;f++) fHtml += buildField(sec.fields[f], d[sec.fields[f]]);
    sectHtml += '<div class="psection"><div class="psection-title">'+sec.icon+' '+sec.label+'</div><div class="'+(isDescSec?'fields-grid-desc':'fields-grid')+'">'+fHtml+'</div></div>';
  }
  var tags = '';
  if(d['FORMATO DE VENDA']) tags += '<span class="tag tag-formato">'+esc(d['FORMATO DE VENDA'])+'</span>';
  if(d['SKU']) tags += '<span class="tag tag-sku">SKU '+esc(d['SKU'])+'</span>';
  if(d['MARCA']) tags += '<span class="tag tag-brand">'+esc(d['MARCA'])+'</span>';
  if(d['CATEGORIA ENOVA']) tags += '<span class="tag tag-cat">'+esc(d['CATEGORIA ENOVA'])+'</span>';
  if(d['LINHA']) tags += '<span class="tag tag-linha">'+esc(d['LINHA'])+'</span>';
  return '<div class="product-card">'+
    '<div class="product-card-header">'+
      '<div class="product-card-header-info">'+
        '<div class="product-card-title">'+esc(d['TÍTULO']||'Sem título')+'</div>'+
        '<div class="product-card-tags">'+tags+'</div>'+
      '</div>'+
      '<button class="btn-card-toggle" onclick="toggleCard(this)">'+(expanded?'Recolher':'Ver detalhes')+' <span class="arrow'+arrowCls+'">&#9660;</span></button>'+
    '</div>'+
    '<div class="product-sections'+openCls+'">'+sectHtml+'</div>'+
  '</div>';
}

function toggleCard(btn) {
  var sec = btn.closest('.product-card').querySelector('.product-sections');
  var isOpen = sec.classList.toggle('open');
  btn.innerHTML = (isOpen?'Recolher':'Ver detalhes')+' <span class="arrow'+(isOpen?' open':'')+'">&#9660;</span>';
}

function toggleAll() {
  var btn = document.getElementById('btnToggleAll');
  allExpanded = !allExpanded;
  document.querySelectorAll('.product-sections').forEach(function(s){ if(allExpanded) s.classList.add('open'); else s.classList.remove('open'); });
  document.querySelectorAll('.btn-card-toggle').forEach(function(b){ b.innerHTML=(allExpanded?'Recolher':'Ver detalhes')+' <span class="arrow'+(allExpanded?' open':'')+'">&#9660;</span>'; });
  if(btn) btn.innerHTML = (allExpanded?'&#9650; Diminuir todos':'&#9660; Expandir todos');
}

function copyFromCard(btn) {
  var card = btn.closest('.field-item');
  var encoded = card.getAttribute('data-copy')||'';
  var ta = document.createElement('textarea');
  ta.innerHTML = encoded;
  var val = ta.value;
  var done = function() {
    btn.textContent='✓ Copiado'; btn.classList.add('copied');
    setTimeout(function(){ btn.textContent='Copiar'; btn.classList.remove('copied'); }, 1800);
  };
  if(navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(val).then(done).catch(function(){ fb(val); done(); });
  } else { fb(val); done(); }
  function fb(t) {
    var el = document.createElement('textarea'); el.value = t;
    el.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
    document.body.appendChild(el); el.focus(); el.select();
    try{ document.execCommand('copy'); }catch(e){}
    document.body.removeChild(el);
  }
}
</script>
